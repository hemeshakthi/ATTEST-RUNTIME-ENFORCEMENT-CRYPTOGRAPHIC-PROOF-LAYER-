# GitHub Actions workflow: build, push to ghcr.io, and trigger Nitro Cloud deployment
# Expects the following repository secrets to be configured:
# - NITRO_API_URL: API endpoint to trigger a deployment (e.g. https://api.nitrocloud.example/deploy)
# - NITRO_API_TOKEN: API token used for authorization (Bearer)
# - NITRO_APP_ID: Identifier of the Nitro Cloud application/environment to deploy
# Note: The Nitro Cloud API payload below is a generic JSON body. Adjust the curl command and body to match the Nitro Cloud API your account requires.

name: Build, Push and Deploy to Nitro Cloud

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}

      - name: Set image output
        id: set-image
        run: echo "image=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nitro Cloud deployment
        env:
          NITRO_API_URL: ${{ secrets.NITRO_API_URL }}
          NITRO_API_TOKEN: ${{ secrets.NITRO_API_TOKEN }}
          NITRO_APP_ID: ${{ secrets.NITRO_APP_ID }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          echo "Triggering Nitro Cloud deploy for image: $IMAGE"
          # Example POST payload — modify keys to match Nitro Cloud's API
          curl -s -X POST "$NITRO_API_URL" \
            -H "Authorization: Bearer $NITRO_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"app_id":"'$NITRO_APP_ID'","image":"'$IMAGE'"}' \
            -o /tmp/nitro-response.json -w "\nHTTP_STATUS:%{http_code}\n"
          echo "Response from Nitro Cloud:" && cat /tmp/nitro-response.json
